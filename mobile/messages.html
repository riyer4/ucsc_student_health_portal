<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Messages — UCSC Student Health</title>
  <link rel="stylesheet" href="css/mobile.css" />
  <style>
    /* ── Thread List ─────────────────────────────────── */
    .msg-thread-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
      cursor: pointer;
      transition: background var(--t);
      -webkit-tap-highlight-color: transparent;
    }
    .msg-thread-item:last-child { border-bottom: none; }
    .msg-thread-item:active { background: var(--gray-50); }
    .msg-thread-item.unread .thread-name { font-weight: 700; color: var(--gray-900); }
    .msg-thread-item.unread .thread-preview { color: var(--gray-700); font-weight: 500; }

    .thread-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: var(--white);
      flex-shrink: 0;
    }
    .av-blue   { background: var(--blue-700); }
    .av-green  { background: var(--green-500); }
    .av-gold   { background: var(--gold-500); color: var(--blue-900); }
    .av-purple { background: #7C3AED; }

    .thread-body { flex: 1; min-width: 0; }
    .thread-top  { display: flex; align-items: baseline; justify-content: space-between; gap: 6px; margin-bottom: 2px; }
    .thread-name { font-size: 0.875rem; font-weight: 500; color: var(--gray-700); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread-time { font-size: 0.7rem; color: var(--gray-400); flex-shrink: 0; }
    .thread-preview { font-size: 0.8rem; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .thread-unread-dot {
      width: 8px; height: 8px;
      background: var(--blue-600);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .msg-thread-item:not(.unread) .thread-unread-dot { visibility: hidden; }

    /* ── Toolbar ─────────────────────────────────────── */
    .msg-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
    }
    .msg-filter-pills { display: flex; gap: 6px; }
    .msg-filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.78rem; font-weight: 600;
      border: 1.5px solid var(--gray-300);
      background: none; cursor: pointer;
      color: var(--gray-500);
      font-family: var(--font);
      transition: background var(--t), border-color var(--t), color var(--t);
    }
    .msg-filter-btn.active {
      background: var(--blue-800);
      border-color: var(--blue-800);
      color: var(--white);
    }
    .msg-toolbar-actions { display: flex; gap: 8px; align-items: center; }
    .msg-action-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      cursor: pointer;
      color: var(--gray-600);
      transition: transform var(--t), background var(--t);
    }
    .msg-action-btn:active { transform: scale(0.93); }
    .msg-action-btn.primary {
      background: var(--blue-800);
      border-color: var(--blue-800);
      color: var(--white);
    }

    /* ── Conversation View ───────────────────────────── */
    #conv-view {
      display: none;
      flex-direction: column;
      position: fixed;
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--gray-50);
      z-index: 300;
      overflow: hidden;
    }
    #conv-view.open { display: flex; }

    .conv-header {
      position: sticky;
      top: 0;
      background: var(--blue-800);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: var(--header-h);
      z-index: 10;
      flex-shrink: 0;
    }
    .conv-back-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      border: none;
      color: white;
      flex-shrink: 0;
    }
    .conv-provider-info { flex: 1; min-width: 0; }
    .conv-provider-name { font-size: 0.9rem; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-provider-role { font-size: 0.65rem; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.05em; }

    .conv-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 80px;
    }

    .conv-msg { display: flex; align-items: flex-end; gap: 8px; }
    .conv-msg.mine { flex-direction: row-reverse; }

    /* Wrapper constrains width and stacks bubble + time vertically */
    .conv-bubble-wrap {
      max-width: 75%;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .conv-msg.mine .conv-bubble-wrap  { align-items: flex-end; }
    .conv-msg:not(.mine) .conv-bubble-wrap { align-items: flex-start; }

    .conv-bubble {
      padding: 10px 13px;
      border-radius: 16px 16px 16px 4px;
      font-size: 0.875rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .conv-msg.mine .conv-bubble {
      background: var(--gray-200);
      color: var(--gray-900);
      font-weight: 500;
      border-radius: 16px 16px 4px 16px;
    }
    .conv-msg:not(.mine) .conv-bubble {
      background: var(--white);
      color: var(--gray-700);
      border: 1px solid var(--gray-200);
    }
    .conv-time { font-size: 0.65rem; color: var(--gray-400); }

    /* File chips inside a bubble */
    .bubble-files { display: flex; flex-direction: column; gap: 4px; margin-top: 7px; }
    .bubble-file-chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.07);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.72rem;
      color: inherit;
      font-weight: 500;
      max-width: 200px;
    }
    .bubble-file-chip span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .conv-avatar-sm {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700; color: var(--white);
      flex-shrink: 0;
    }

    .conv-date-divider {
      text-align: center;
      font-size: 0.7rem;
      color: var(--gray-400);
      font-weight: 500;
      padding: 4px 0;
    }

    /* ── Reply Bar ───────────────────────────────────── */
    .conv-reply-bar {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--white);
      border-top: 1px solid var(--gray-200);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }
    .conv-reply-input {
      flex: 1;
      border: 1px solid var(--gray-300);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 0.875rem;
      outline: none;
      resize: none;
      font-family: var(--font);
      line-height: 1.4;
      max-height: 100px;
      background: var(--gray-50);
      color: var(--gray-900);
    }
    .conv-reply-input:focus { border-color: var(--blue-600); background: var(--white); }
    .conv-send-btn {
      width: 36px; height: 36px;
      background: var(--blue-800);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; flex-shrink: 0;
      transition: transform var(--t);
    }
    .conv-send-btn:active { transform: scale(0.9); }

    /* ── Compose Modal ───────────────────────────────── */
    #compose-modal {
      display: none;
      position: fixed;
      top: 0; bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      z-index: 400;
      background: rgba(0,0,0,0.45);
      align-items: flex-end;
    }
    #compose-modal.open { display: flex; }

    .compose-sheet {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: var(--white);
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 32px;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .compose-handle {
      width: 36px; height: 4px;
      background: var(--gray-300);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .compose-title {
      font-size: 1rem; font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 16px;
    }
    .compose-field { margin-bottom: 12px; }
    .compose-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--gray-500);
      margin-bottom: 5px;
    }
    .compose-select, .compose-textarea {
      width: 100%;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 0.875rem;
      font-family: var(--font);
      color: var(--gray-900);
      background: var(--white);
      outline: none;
    }
    .compose-select:focus, .compose-textarea:focus { border-color: var(--blue-600); }
    .compose-textarea { resize: none; height: 100px; line-height: 1.5; }
    .compose-actions { display: flex; gap: 10px; margin-top: 16px; }
    .compose-cancel {
      flex: 1; padding: 11px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-md);
      font-size: 0.875rem; font-weight: 600;
      color: var(--gray-600);
      background: none; cursor: pointer;
    }
    .compose-send-btn {
      flex: 2; padding: 11px;
      background: var(--blue-800);
      border-radius: var(--radius-md);
      font-size: 0.875rem; font-weight: 600;
      color: var(--white);
      border: none; cursor: pointer;
    }

    /* ── Attachments ─────────────────────────────────── */
    .attach-btn {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      border: none; background: none;
      color: var(--gray-400);
      cursor: pointer;
      flex-shrink: 0;
      transition: color var(--t), background var(--t);
    }
    .attach-btn:active { color: var(--blue-600); background: var(--blue-50); }
    .attach-list {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 6px 12px 0;
    }
    .attach-list:empty { display: none; }
    .attach-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--blue-50); border: 1px solid var(--blue-100);
      border-radius: 20px;
      padding: 3px 8px 3px 6px;
      font-size: 0.72rem; color: var(--blue-800); font-weight: 500;
      max-width: 180px;
    }
    .attach-chip span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .attach-chip button {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--blue-200); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; color: var(--blue-800); flex-shrink: 0;
      line-height: 1;
    }

    /* ── Empty State ─────────────────────────────────── */
    .m-empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--gray-400);
    }
    .m-empty-state svg { margin: 0 auto 12px; opacity: 0.4; }
    .m-empty-state p { font-size: 0.875rem; }
  </style>
</head>
<body>

  <!-- ═══ HEADER ═══════════════════════════════════════════ -->
  <header class="m-header">
    <div class="m-header__brand">
      <div class="m-header__logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <div>
        <span class="m-header__title">Messages</span>
        <span class="m-header__sub">UC Santa Cruz</span>
      </div>
    </div>
    <div class="m-header__actions">
      <a class="m-desktop-btn" href="../messages.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Desktop
      </a>
      <a class="m-header__icon-btn" href="notifications.html" aria-label="Notifications">
        <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="m-notif-dot"></span>
      </a>
      <div class="m-avatar">RS</div>
    </div>
  </header>

  <!-- ═══ SCREEN ════════════════════════════════════════════ -->
  <main class="m-screen" style="padding-bottom:0">

    <!-- Toolbar -->
    <div class="msg-toolbar">
      <div class="msg-filter-pills">
        <button class="msg-filter-btn active" id="filter-all"    onclick="setFilter('all')">All</button>
        <button class="msg-filter-btn"        id="filter-unread" onclick="setFilter('unread')">Unread</button>
        <button class="msg-filter-btn"        id="filter-sent"   onclick="setFilter('sent')">Sent</button>
      </div>
      <div class="msg-toolbar-actions">
        <button class="msg-action-btn" onclick="markAllRead()" title="Mark all as read">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
        <button class="msg-action-btn primary" onclick="openCompose()" title="Compose new message">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Unified Thread List -->
    <div id="thread-list"></div>

    <!-- Bottom spacer for nav -->
    <div style="height:calc(var(--bottom-nav-h) + 8px)"></div>

  </main>

  <!-- ═══ CONVERSATION VIEW (full-screen overlay) ══════════ -->
  <div id="conv-view">
    <div class="conv-header">
      <button class="conv-back-btn" id="conv-back" onclick="closeConv()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="conv-provider-info">
        <div class="conv-provider-name" id="conv-name">Provider</div>
        <div class="conv-provider-role" id="conv-role">Role</div>
      </div>
    </div>
    <div class="conv-messages" id="conv-messages"></div>
    <div class="conv-reply-bar" style="flex-direction:column;align-items:stretch;padding:8px 12px 10px">
      <div id="reply-attach-list" class="attach-list"></div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
        <input type="file" id="reply-file-input" multiple style="display:none" onchange="handleReplyAttach(this)">
        <button class="attach-btn" onclick="document.getElementById('reply-file-input').click()" title="Attach file">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <textarea class="conv-reply-input" id="reply-input" placeholder="Type a message…" rows="1"
          oninput="autoResize(this)" style="flex:1"></textarea>
        <button class="conv-send-btn" onclick="sendReply()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ COMPOSE MODAL ════════════════════════════════════ -->
  <div id="compose-modal" onclick="closeComposeOnBg(event)">
    <div class="compose-sheet">
      <div class="compose-handle"></div>
      <div class="compose-title">New Message</div>
      <div class="compose-field">
        <div class="compose-label">To</div>
        <select class="compose-select" id="compose-to">
          <option value="">Select provider…</option>
          <option>Dr. Sarah Kim</option>
          <option>Dr. Marcus Webb</option>
          <option>Dr. Priya Nair</option>
          <option>Dr. James Okafor</option>
          <option>Campus Pharmacy</option>
          <option>Appointments Office</option>
          <option>Billing Office</option>
          <option>Student Health Center</option>
        </select>
      </div>
      <div class="compose-field">
        <div class="compose-label">Subject</div>
        <input type="text" class="compose-select" id="compose-subject" placeholder="Subject…" />
      </div>
      <div class="compose-field">
        <div class="compose-label">Message</div>
        <textarea class="compose-textarea" id="compose-body" placeholder="Write your message…"></textarea>
      </div>
      <div class="compose-field">
        <div class="compose-label">Attachments</div>
        <input type="file" id="compose-file-input" multiple style="display:none" onchange="handleComposeAttach(this)">
        <div id="compose-attach-list" class="attach-list" style="padding:0 0 6px"></div>
        <button type="button" onclick="document.getElementById('compose-file-input').click()"
          style="display:flex;align-items:center;gap:6px;padding:8px 12px;border:1.5px dashed var(--gray-300);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:0.8rem;color:var(--gray-500);font-family:var(--font);width:100%;transition:border-color var(--t),color var(--t)"
          onmouseover="this.style.borderColor='var(--blue-600)';this.style.color='var(--blue-600)'"
          onmouseout="this.style.borderColor='var(--gray-300)';this.style.color='var(--gray-500)'">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
          Attach files
        </button>
      </div>
      <div class="compose-actions">
        <button class="compose-cancel" onclick="closeCompose()">Cancel</button>
        <button class="compose-send-btn" onclick="sendCompose()">Send Message</button>
      </div>
    </div>
  </div>

  <!-- ═══ BOTTOM NAV ════════════════════════════════════════ -->

    <a class="m-nav-tab active" href="messages.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      Messages
    </a>
    <a class="m-nav-tab" href="billing.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
        <line x1="1" y1="10" x2="23" y2="10"/>
      </svg>
      Billing
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>
    /* ── Data ─────────────────────────────────────────── */
    const CONTACTS = {
      'Dr. Sarah Kim':       { initials: 'SK', av: 'av-blue',   role: 'Primary Care Physician' },
      'Campus Pharmacy':     { initials: 'Rx', av: 'av-green',  role: 'Pharmacy Services' },
      'Dr. Marcus Webb':     { initials: 'MW', av: 'av-purple', role: 'CAPS Counseling' },
      'Appointments Office': { initials: 'AO', av: 'av-gold',   role: 'Scheduling' },
      'Dr. Priya Nair':      { initials: 'PN', av: 'av-blue',   role: 'Internal Medicine' },
      'Dr. James Okafor':    { initials: 'JO', av: 'av-green',  role: 'Sports Medicine' },
      'Billing Office':      { initials: 'BO', av: 'av-gold',   role: 'Student Billing' },
      'Student Health Center':{ initials:'SH', av: 'av-blue',   role: 'Health Center' },
    };

    let currentThread = null;
    let filterMode = 'all'; // 'all' | 'unread' | 'sent'

    const threads = [
      {
        id: 't1', from: 'Dr. Sarah Kim', unread: true, time: '10:24 AM',
        subject: 'Follow-up on your blood work',
        messages: [
          { mine: false, text: 'Hi Ria, your CBC results came back. Overall looking good — your hemoglobin and white cell counts are within normal range.', time: '10:15 AM' },
          { mine: false, text: 'However, your Vitamin D is on the lower side. I\'d recommend a supplement of 2000 IU daily. Let me know if you have any questions!', time: '10:16 AM' },
        ]
      },
      {
        id: 't2', from: 'Campus Pharmacy', unread: true, time: 'Yesterday',
        subject: 'Prescription ready for pickup',
        messages: [
          { mine: false, text: 'Your prescription for Vitamin D3 2000 IU is ready for pickup at the Student Health Center pharmacy.', time: 'Yesterday 2:30 PM' },
          { mine: false, text: 'Pharmacy hours: Mon–Fri 9AM–6PM, Sat 10AM–2PM.', time: 'Yesterday 2:31 PM' },
        ]
      },
      {
        id: 't3', from: 'Dr. Marcus Webb', unread: false, time: 'Apr 8',
        subject: 'Session notes and resources',
        messages: [
          { mine: false, text: 'Great session today, Ria. Here are a few mindfulness resources I mentioned:', time: 'Apr 8 11:45 AM' },
          { mine: false, text: '— Headspace app (free with UCSC ID)\n— CAPS drop-in hours: Mon/Wed 1–4PM\n— Crisis line: (831) 459-1889', time: 'Apr 8 11:46 AM' },
          { mine: true,  text: 'Thank you so much, Dr. Webb! I\'ll check those out before our next session.', time: 'Apr 8 12:02 PM' },
        ]
      },
      {
        id: 't4', from: 'Appointments Office', unread: false, time: 'Apr 5',
        subject: 'Appointment confirmed: Apr 15',
        messages: [
          { mine: false, text: 'Your appointment with Dr. Sarah Kim on April 15 at 2:00 PM has been confirmed. Location: Student Health Center, Room 204.', time: 'Apr 5 9:00 AM' },
          { mine: true,  text: 'Thank you!', time: 'Apr 5 9:15 AM' },
        ]
      },
    ];

    const sentThreads = [
      {
        id: 's1', to: 'Dr. Priya Nair', unread: true, time: 'Apr 10',
        subject: 'Question about my iron levels',
        messages: [
          { mine: true,  text: 'Hi Dr. Nair, I had a question about my iron panel from last month. Should I be concerned about the ferritin level?', time: 'Apr 10 3:45 PM' },
          { mine: false, text: 'Hi Ria! Your ferritin at 18 ng/mL is within the low-normal range. Not a concern right now, but I\'d suggest eating more iron-rich foods — spinach, lentils, lean meat. We can retest in 3 months.', time: 'Apr 11 9:20 AM' },
        ]
      },
      {
        id: 's2', to: 'Appointments Office', unread: true, time: 'Apr 3',
        subject: 'Request to reschedule',
        messages: [
          { mine: true,  text: 'Hi, I\'d like to reschedule my appointment originally set for Apr 8. Would Apr 15 at 2pm work?', time: 'Apr 3 11:00 AM' },
          { mine: false, text: 'Absolutely! I\'ve moved your appointment to April 15 at 2:00 PM with Dr. Kim. You\'ll receive a confirmation shortly.', time: 'Apr 3 11:45 AM' },
        ]
      },
    ];

    /* ── Apply persisted read state ───────────────────── */
    (function applyReadState() {
      if (typeof getReadThreads === 'function') {
        const read = getReadThreads();
        threads.forEach(t => { if (read.includes(t.id)) t.unread = false; });
      }
    })();

    /* ── Helpers ──────────────────────────────────────── */
    function renderContact(name) {
      return CONTACTS[name] || { initials: name.charAt(0), av: 'av-blue', role: '' };
    }

    /* Returns combined list tagged with .isSent */
    function getAllThreads() {
      return [
        ...threads.map(t => ({ ...t, isSent: false })),
        ...sentThreads.map(t => ({ ...t, isSent: true })),
      ];
    }

    function fileChipsHTML(files) {
      if (!files || !files.length) return '';
      return `<div class="bubble-files">${files.map(f => `
        <div class="bubble-file-chip">
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
          <span>${f.name || f}</span>
        </div>`).join('')}</div>`;
    }

    function bubbleMsgHTML(m, c) {
      return `
        <div class="conv-msg ${m.mine ? 'mine' : ''}">
          ${!m.mine ? `<div class="conv-avatar-sm ${c.av}">${c.initials}</div>` : ''}
          <div class="conv-bubble-wrap">
            <div class="conv-bubble">
              ${m.text.replace(/\n/g, '<br>')}
              ${fileChipsHTML(m.files)}
            </div>
            <div class="conv-time">${m.time}</div>
          </div>
        </div>`;
    }

    /* ── Render thread list ───────────────────────────── */
    function renderThreadList() {
      const all = getAllThreads();
      let list;
      if (filterMode === 'unread') list = all.filter(t => t.unread);
      else if (filterMode === 'sent') list = all.filter(t => t.isSent);
      else list = all;

      const wrap = document.getElementById('thread-list');
      wrap.innerHTML = list.length === 0
        ? `<div class="m-empty-state">
             <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
             <p>No messages here</p>
           </div>`
        : list.map(t => {
          const name = t.isSent ? t.to : t.from;
          const c = renderContact(name);
          const lastMsg = t.messages[t.messages.length - 1];
          const preview = lastMsg ? lastMsg.text.substring(0, 60) + (lastMsg.text.length > 60 ? '…' : '') : t.subject;
          return `<div class="msg-thread-item ${t.unread ? 'unread' : ''}" onclick="openThread('${t.id}')">
            <div class="thread-avatar ${c.av}">${c.initials}</div>
            <div class="thread-body">
              <div class="thread-top">
                <span class="thread-name">${t.isSent ? '→ ' + name : name}</span>
                <span class="thread-time">${t.time}</span>
              </div>
              <div class="thread-preview">${preview}</div>
            </div>
            <div class="thread-unread-dot"></div>
          </div>`;
        }).join('');
    }

    /* ── Open conversation ────────────────────────────── */
    function openThread(id) {
      const t = threads.find(x => x.id === id) || sentThreads.find(x => x.id === id);
      if (!t) return;
      const isSent = !!sentThreads.find(x => x.id === id);
      currentThread = { thread: t, isSent };

      if (t.unread) {
        t.unread = false;
        if (typeof saveReadThread === 'function') saveReadThread(t.id);
        renderThreadList();
      }

      const name = isSent ? t.to : t.from;
      const c = renderContact(name);

      document.getElementById('conv-name').textContent = name;
      document.getElementById('conv-role').textContent = c.role;

      const msgsEl = document.getElementById('conv-messages');
      msgsEl.innerHTML = t.messages.map(m => bubbleMsgHTML(m, c)).join('');

      document.getElementById('conv-view').classList.add('open');
      msgsEl.scrollTop = msgsEl.scrollHeight;
      document.getElementById('reply-input').value = '';
    }

    function closeConv() {
      document.getElementById('conv-view').classList.remove('open');
      currentThread = null;
      replyAttachments = [];
      document.getElementById('reply-attach-list').innerHTML = '';
    }

    /* ── Send reply ───────────────────────────────────── */
    function sendReply() {
      const input = document.getElementById('reply-input');
      const text = input.value.trim();
      if ((!text && !replyAttachments.length) || !currentThread) return;

      const now  = new Date();
      const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      const files = replyAttachments.map(f => f.name);
      const newMsg = { mine: true, text: text || '', time, files };
      currentThread.thread.messages.push(newMsg);

      const name = currentThread.isSent ? currentThread.thread.to : currentThread.thread.from;
      const c = renderContact(name);

      const msgsEl = document.getElementById('conv-messages');
      msgsEl.insertAdjacentHTML('beforeend', bubbleMsgHTML(newMsg, c));
      msgsEl.scrollTop = msgsEl.scrollHeight;

      input.value = '';
      input.style.height = '';
      replyAttachments = [];
      document.getElementById('reply-attach-list').innerHTML = '';
      renderThreadList();
    }

    /* ── Filter ───────────────────────────────────────── */
    function setFilter(mode) {
      filterMode = mode;
      ['all', 'unread', 'sent'].forEach(m =>
        document.getElementById('filter-' + m).classList.toggle('active', m === mode)
      );
      renderThreadList();
    }

    /* ── Mark all read ────────────────────────────────── */
    function markAllRead() {
      const all = getAllThreads();
      const visible = filterMode === 'unread' ? all.filter(t => t.unread)
                    : filterMode === 'sent'   ? all.filter(t => t.isSent)
                    : all;
      visible.forEach(t => {
        const src = threads.find(x => x.id === t.id) || sentThreads.find(x => x.id === t.id);
        if (src && src.unread) {
          src.unread = false;
          if (typeof saveReadThread === 'function') saveReadThread(src.id);
        }
      });
      renderThreadList();
    }

    /* ── Compose ──────────────────────────────────────── */
    function openCompose() {
      document.getElementById('compose-modal').classList.add('open');
    }
    function closeCompose() {
      document.getElementById('compose-modal').classList.remove('open');
      composeAttachments = [];
      document.getElementById('compose-attach-list').innerHTML = '';
    }
    function closeComposeOnBg(e) {
      if (e.target === document.getElementById('compose-modal')) closeCompose();
    }
    function sendCompose() {
      const to      = document.getElementById('compose-to').value;
      const subject = document.getElementById('compose-subject').value.trim();
      const body    = document.getElementById('compose-body').value.trim();
      if (!to || !body) { alert('Please select a recipient and write a message.'); return; }

      const now   = new Date();
      const time  = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      const files = composeAttachments.map(f => f.name);
      const newThread = {
        id: 'sc_' + Date.now(),
        to, unread: false, time: 'Just now',
        subject: subject || '(no subject)',
        messages: [{ mine: true, text: body, time, files }]
      };
      sentThreads.unshift(newThread);

      document.getElementById('compose-to').value      = '';
      document.getElementById('compose-subject').value = '';
      document.getElementById('compose-body').value    = '';
      closeCompose();
      openThread(newThread.id);
      renderThreadList();
    }

    /* ── Attachments ─────────────────────────────────── */
    let replyAttachments   = [];
    let composeAttachments = [];

    function renderAttachChips(listId, arr) {
      const el = document.getElementById(listId);
      el.innerHTML = arr.map((f, i) => `
        <div class="attach-chip">
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
          <span>${f.name}</span>
          <button onclick="removeAttach('${listId}',${i})" title="Remove">×</button>
        </div>`).join('');
    }

    function handleReplyAttach(input) {
      replyAttachments = replyAttachments.concat(Array.from(input.files));
      renderAttachChips('reply-attach-list', replyAttachments);
      input.value = '';
    }

    function handleComposeAttach(input) {
      composeAttachments = composeAttachments.concat(Array.from(input.files));
      renderAttachChips('compose-attach-list', composeAttachments);
      input.value = '';
    }

    function removeAttach(listId, idx) {
      if (listId === 'reply-attach-list') {
        replyAttachments.splice(idx, 1);
        renderAttachChips('reply-attach-list', replyAttachments);
      } else {
        composeAttachments.splice(idx, 1);
        renderAttachChips('compose-attach-list', composeAttachments);
      }
    }

    /* ── Auto-resize textarea ─────────────────────────── */
    function autoResize(el) {
      el.style.height = '';
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    /* ── Init ─────────────────────────────────────────── */
    renderThreadList();

    // Enter key sends reply
    document.getElementById('reply-input').addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); sendReply(); }
    });
  </script>
  <script src="js/mobile.js"></script>
</body>
